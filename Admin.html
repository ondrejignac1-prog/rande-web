<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <title>Admin 💌</title>
</head>

<body style="font-family: Arial; padding: 20px;">

<h1>Odpovede 💖</h1>

<div id="list">Načítavam...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCT_whKKvgNbfE0gSydjbA4bqlNiOYAyr4",
  authDomain: "rande-8eac3.firebaseapp.com",
  projectId: "rande-8eac3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const querySnapshot = await getDocs(collection(db, "rande"));

let html = "";

querySnapshot.forEach((doc) => {
  const d = doc.data();

  html += `
    <div style="border:1px solid #ccc; padding:10px; margin:10px;">
      <b>${d.date} ${d.time}</b><br>
      Typ: ${d.type}<br>
      Snack: ${d.snack}<br>
      Poznámka: ${d.note}
    </div>
  `;
});

document.getElementById("list").innerHTML = html;
</script>

</body>
</html>
